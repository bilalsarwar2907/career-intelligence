name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore CareerCopilot/CareerCopilot.csproj

      - name: Build
        run: dotnet build CareerCopilot/CareerCopilot.csproj --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release || echo "No test projects found"
